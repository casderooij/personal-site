name: Sketch

status:
  draft: true
  unlisted: true
  listed: false

create:
  title: "{{ page.date.toDate('Y-m-d') }}"
  slug: "{{ page.date.toDate('Y-m-d') }}"
  fields:
    - date

columns:
  main:
    width: 2/3
    fields:
      gallery:
        type: files
        label: Image(s)
        layout: cards
        uploads: image

  meta:
    width: 1/3
    fields:
      date:
        type: date
        display: DD-MM-YYYY
      tags:
        type: tags
        options:
          type: query
          query: page.siblings.pluck("tags", ",", true)
      sources:
        type: files
        uploads: source
