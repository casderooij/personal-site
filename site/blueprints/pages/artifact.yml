name: Artifact

status:
  draft: true
  unlisted: true
  listed: false

columns:
  main:
    width: 2/3
    fields:
      description:
        type: writer
        label: description
        marks: false
        headings: []
      gallery:
        type: files
        label: Image(s)
        layout: cards
        uploads: image

  meta:
    width: 1/3
    fields:
      date:
        type: date
        display: DD-MM-YYYY
      tags:
        type: tags
        options:
          type: query
          query: page.siblings.pluck("tags", ",", true)
      sources:
        type: files
        uploads: source
